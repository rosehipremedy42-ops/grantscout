<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login or Register — GrantScout UK Grant Finder</title>
<meta name="description" content="Sign in to GrantScout to find UK government grants and get AI help with your applications. Free plan available.">
<meta name="keywords" content="GrantScout login, grant finder UK, free grant search">
<meta name="robots" content="index, follow">
<meta property="og:title" content="Login or Register — GrantScout UK Grant Finder">
<meta property="og:description" content="Sign in to GrantScout to find UK government grants and get AI help with your applications. Free plan available.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Login or Register — GrantScout UK Grant Finder">
<meta name="twitter:description" content="Sign in to GrantScout to find UK government grants and get AI help with your applications. Free plan available.">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{--navy:#0a0e1a;--ink:#141927;--panel:#1a2035;--border:#252d45;--accent:#00e5a0;--accent2:#4f6dff;--warn:#ffb830;--text:#e2e8f8;--muted:#6b7a9e;--white:#ffffff;--danger:#ff6b6b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--navy);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(79,109,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(79,109,255,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}

.card{position:relative;z-index:1;width:100%;max-width:420px;padding:24px;margin:24px;}
.logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:32px;}
.logo-icon{width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.logo-text{font-family:'DM Serif Display',serif;font-size:22px;color:var(--white);}
.logo-text span{color:var(--accent);}

.tabs{display:flex;background:var(--ink);border-radius:10px;padding:4px;margin-bottom:24px;border:1px solid var(--border);}
.tab{flex:1;padding:9px;border-radius:7px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;}
.tab.active{background:var(--panel);color:var(--white);box-shadow:0 1px 4px rgba(0,0,0,.3);}

.form-group{margin-bottom:16px;}
label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;}
input{width:100%;background:var(--ink);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:12px 14px;transition:border-color .2s;}
input:focus{outline:none;border-color:var(--accent2);box-shadow:0 0 0 3px rgba(79,109,255,.1);}
input::placeholder{color:var(--muted);}

.btn{width:100%;padding:13px;background:var(--accent);color:var(--navy);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:8px;}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,229,160,.3);}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none;}

.error{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);border-radius:8px;padding:11px 14px;font-size:13px;color:var(--danger);margin-top:12px;display:none;}
.error.show{display:block;}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

.tiers{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.tier{background:var(--ink);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.tier.premium{border-color:rgba(0,229,160,.3);background:rgba(0,229,160,.04);}
.tier-name{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;}
.tier.premium .tier-name{color:var(--accent);}
.tier-price{font-family:'DM Mono',monospace;font-size:20px;color:var(--white);margin-bottom:8px;}
.tier-feature{font-size:11px;color:var(--muted);line-height:1.7;}
.tier.premium .tier-feature{color:var(--text);}

.footer-note{text-align:center;font-size:12px;color:var(--muted);margin-top:20px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🏛️</div>
    <div class="logo-text">Grant<span>Scout</span> UK</div>
  </div>

  <div class="tiers">
    <div class="tier">
      <div class="tier-name">Free</div>
      <div class="tier-price">£0</div>
      <div class="tier-feature">3 searches/day<br>1 application/month<br>Project section only</div>
    </div>
    <div class="tier premium">
      <div class="tier-name">⭐ Premium</div>
      <div class="tier-price">£9.99<span style="font-size:12px;color:var(--muted)">/mo</span></div>
      <div class="tier-feature">Unlimited searches<br>Unlimited applications<br>All features unlocked</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('login')">Log In</button>
    <button class="tab" onclick="showTab('register')">Create Account</button>
  </div>

  <!-- Login form -->
  <div id="loginForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">Log In</button>
    <div class="error" id="loginError"></div>
  </div>

  <!-- Register form -->
  <div id="registerForm" style="display:none">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px">(min 8 characters)</span></label>
      <input type="password" id="regPassword" placeholder="••••••••" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="regConfirm" placeholder="••••••••" autocomplete="new-password"
        onkeydown="if(event.key==='Enter')doRegister()">
    </div>
    <button class="btn" id="regBtn" onclick="doRegister()">Create Free Account</button>
    <div class="error" id="regError"></div>
  </div>

  <div class="footer-note">🔒 Secure · Your data is encrypted · No spam</div>
</div>

<script>
function showTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('loginForm').style.display    = tab==='login'    ? '' : 'none';
  document.getElementById('registerForm').style.display = tab==='register' ? '' : 'none';
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.classList.add('show');
}
function clearError(id) { document.getElementById(id).classList.remove('show'); }

async function doLogin() {
  clearError('loginError');
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) { showError('loginError','Please fill in all fields'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Logging in…';
  try {
    const r = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email, password }) });
    const data = await r.json();
    if (!r.ok) { showError('loginError', data.error || 'Login failed'); return; }
    localStorage.setItem('gs_token', data.token);
    localStorage.setItem('gs_email', data.email);
    localStorage.setItem('gs_tier',  data.tier);
    window.location.href = 'index.html';
  } catch(e) { showError('loginError', 'Connection error. Is the server running?'); }
  finally { btn.disabled=false; btn.textContent='Log In'; }
}

async function doRegister() {
  clearError('regError');
  const email    = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const confirm  = document.getElementById('regConfirm').value;
  if (!email || !password) { showError('regError','Please fill in all fields'); return; }
  if (password.length < 8)  { showError('regError','Password must be at least 8 characters'); return; }
  if (password !== confirm)  { showError('regError','Passwords do not match'); return; }
  const btn = document.getElementById('regBtn');
  btn.disabled=true; btn.textContent='Creating account…';
  try {
    const r = await fetch('/api/register', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email, password }) });
    const data = await r.json();
    if (!r.ok) { showError('regError', data.error || 'Registration failed'); return; }
    localStorage.setItem('gs_token', data.token);
    localStorage.setItem('gs_email', data.email);
    localStorage.setItem('gs_tier',  data.tier);
    window.location.href = 'index.html';
  } catch(e) { showError('regError', 'Connection error. Is the server running?'); }
  finally { btn.disabled=false; btn.textContent='Create Free Account'; }
}

// If already logged in redirect
if (localStorage.getItem('gs_token')) window.location.href = 'index.html';
</script>
</body>
</html>
